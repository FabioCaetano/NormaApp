<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8943F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D6A4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4332;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo circular verde -->
  <circle cx="50" cy="50" r="48" fill="url(#greenGrad)"/>
  
  <!-- Estrelas douradas -->
  <path d="M50 18 L52 24 L58 24 L53 28 L55 34 L50 30 L45 34 L47 28 L42 24 L48 24 Z" fill="url(#goldGrad)" transform="scale(0.6) translate(33, 10)"/>
  <path d="M50 18 L52 24 L58 24 L53 28 L55 34 L50 30 L45 34 L47 28 L42 24 L48 24 Z" fill="url(#goldGrad)" transform="scale(0.5) translate(40, 15)"/>
  <path d="M50 18 L52 24 L58 24 L53 28 L55 34 L50 30 L45 34 L47 28 L42 24 L48 24 Z" fill="url(#goldGrad)" transform="scale(0.5) translate(60, 15)"/>
  
  <!-- Tesouras cruzadas -->
  <path d="M35 55 L45 65 M45 55 L35 65" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="35" cy="55" r="3" fill="url(#goldGrad)"/>
  <circle cx="45" cy="55" r="3" fill="url(#goldGrad)"/>
  
  <!-- Faixa dourada -->
  <rect x="20" y="70" width="60" height="12" fill="url(#goldGrad)" rx="2"/>
  
  <!-- Texto NORMA BRASIL -->
  <text x="50" y="80" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#0A0A0A" text-anchor="middle">NORMA BRASIL</text>
</svg>
